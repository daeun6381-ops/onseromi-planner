<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Study Planner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Gowun Dodum', sans-serif; background-color: #F0F9FF; margin: 0; overflow: hidden; }
        .digital-font { font-family: 'Orbitron', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        textarea:focus, input:focus { outline: none; box-shadow: none; }
        .rounded-xl { border-radius: 0.75rem; }
        /* 시간표 글자 강조를 위한 추가 스타일 */
        .timetable-cell {
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const LucideIcon = lucide.icons[name];
                    if (LucideIcon) {
                        lucide.createIcons({
                            icons: { [name]: LucideIcon },
                            attrs: { class: className }
                        });
                    }
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('daily');
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [seconds, setSeconds] = useState(0);
            const timerRef = useRef(null);

            const getTodayStr = () => {
                const d = new Date();
                return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
            };

            const [currentDate, setCurrentDate] = useState(getTodayStr());
            const [localResolution, setLocalResolution] = useState('');

            const toggleTimer = () => {
                if (isTimerRunning) {
                    clearInterval(timerRef.current);
                } else {
                    timerRef.current = setInterval(() => { setSeconds(prev => prev + 1); }, 1000);
                }
                setIsTimerRunning(!isTimerRunning);
            };

            const resetTimer = () => {
                clearInterval(timerRef.current);
                setIsTimerRunning(false);
                setSeconds(0);
            };

            const formatDisplayDate = (dateStr) => {
                const year = dateStr.substring(0, 4);
                const month = dateStr.substring(4, 6);
                const day = dateStr.substring(6, 8);
                const d = new Date(`${year}-${month}-${day}`);
                const dayOfWeek = ["일", "월", "화", "수", "목", "금", "토"][d.getDay()];
                return `${year}/${month}/${day}/(${dayOfWeek})`;
            };

            const formatTimeMain = (s) => {
                const mins = Math.floor((s % 3600) / 60);
                const secs = s % 60;
                return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            };

            const changeDate = (offset) => {
                const d = new Date(currentDate.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3'));
                d.setDate(d.getDate() + offset);
                const newDateStr = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
                setCurrentDate(newDateStr);
            };

            const timetable = [
                ["자율", "문권", "연구", "문박", "B"],
                ["E", "A", "D", "C", "영이"],
                ["A", "B", "영이", "스최", "대손"],
                ["스최", "E", "대손", "대손", "E"],
                ["영유", "대손", "문박", "D", "C"],
                ["D", "영유", "B", "A", "창체"],
                ["문권", "C", "창체", "창체", "창체"]
            ];

            return (
                <div className="h-screen bg-[#F0F9FF] flex items-center justify-center p-0 md:p-4 overflow-hidden relative">
                    <div className="w-full max-w-[1100px] h-full md:max-h-[850px] bg-white shadow-2xl flex relative md:border-l-[30px] overflow-hidden rounded-none md:rounded-xl border-[#082F49]" style={{ borderColor: '#082F49' }}>
                        
                        <div className="flex-1 flex flex-col md:ml-6 overflow-hidden">
                            {/* Header */}
                            <div className="px-3 md:px-5 py-3 flex justify-between items-center border-b border-blue-50 bg-white">
                                <div className="flex items-center gap-3 overflow-hidden">
                                    <button onClick={() => changeDate(-1)} className="p-1.5 hover:bg-blue-50 rounded-full"><Icon name="ChevronLeft" className="w-6 h-6 text-blue-300" /></button>
                                    <h1 className="text-xl md:text-2xl font-black text-gray-900 min-w-[200px] text-center flex items-center gap-2">
                                        <Icon name="Cloud" className="w-5 h-5 text-blue-500" />
                                        {formatDisplayDate(currentDate)}
                                    </h1>
                                    <button onClick={() => changeDate(1)} className="p-1.5 hover:bg-blue-50 rounded-full"><Icon name="ChevronRight" className="w-6 h-6 text-blue-300" /></button>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setView('daily')} className={`px-4 py-1.5 text-xs font-black rounded-full ${view === 'daily' ? 'bg-blue-900 text-white' : 'text-blue-300'}`}>PLANNER</button>
                                    <button onClick={() => setView('archive')} className={`px-4 py-1.5 text-xs font-black rounded-full ${view === 'archive' ? 'bg-blue-900 text-white' : 'text-blue-300'}`}>ARCHIVE</button>
                                </div>
                            </div>

                            {/* Daily View */}
                            <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
                                <div className="flex-[1.8] border-r border-blue-50 p-5 flex flex-col">
                                    <div className="mb-4 p-4 rounded-xl border-2 bg-blue-50/30 border-sky-300 flex items-center gap-3">
                                        <div className="w-2 h-6 rounded-full bg-sky-700" />
                                        <textarea 
                                            value={localResolution}
                                            onChange={(e) => setLocalResolution(e.target.value)}
                                            className="flex-1 bg-transparent text-lg border-none focus:ring-0 resize-none h-6 font-bold text-blue-900" 
                                            placeholder="오늘의 다짐..."
                                        />
                                    </div>
                                    <div className="flex-1 overflow-y-auto scrollbar-hide">
                                        <div className="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2">
                                            <div className="flex items-center gap-2">
                                                <Icon name="Turtle" className="w-5 h-5 text-blue-600" />
                                                <span className="text-[11px] font-black text-white bg-[#0369A1] px-3 py-1 rounded-full uppercase tracking-widest">Tasks</span>
                                            </div>
                                            <button className="w-10 h-10 bg-[#082F49] text-white rounded-xl flex items-center justify-center shadow-lg hover:rotate-90 transition-transform"><Icon name="Plus" className="w-6 h-6" /></button>
                                        </div>
                                        <div className="text-gray-300 italic text-sm text-center py-10 font-bold">할 일이 아직 비어있어요.</div>
                                    </div>
                                </div>

                                <div className="flex-1 p-5 flex flex-col gap-4 bg-blue-50/20 md:bg-transparent">
                                    <div className="flex-1 flex flex-col">
                                        <h3 className="text-[10px] font-black text-blue-800 tracking-widest uppercase mb-2">Weekly Timetable</h3>
                                        <div className="flex-1 bg-white border-2 border-blue-50 rounded-xl overflow-hidden flex flex-col shadow-sm">
                                            <div className="grid grid-cols-5 bg-[#082F49]">
                                                {["월","화","수","목","금"].map(d => <div key={d} className="py-1.5 text-center text-[10px] font-bold text-blue-100 border-r border-white/10">{d}</div>)}
                                            </div>
                                            <div className="flex-1 grid grid-rows-7">
                                                {timetable.map((row, r) => (
                                                    <div key={r} className="grid grid-cols-5 border-b border-blue-50 last:border-b-0">
                                                        {row.map((s, c) => (
                                                            <div key={c} className="border-r border-blue-50 last:border-r-0 flex items-center justify-center p-1 bg-white hover:bg-blue-50 transition-colors">
                                                                <span className="timetable-cell text-[14px] md:text-[16px] text-blue-900 text-center break-keep">
                                                                    {s}
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    {/* Timer */}
                                    <div className="rounded-2xl p-4 bg-[#082F49] flex items-center justify-between shadow-xl">
                                        <button onClick={toggleTimer} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all active:scale-95 ${isTimerRunning ? 'bg-sky-300 text-blue-900 shadow-[0_0_15px_rgba(125,211,252,0.4)]' : 'bg-blue-900 text-sky-300'}`}>
                                            {isTimerRunning ? <Icon name="Pause" className="w-6 h-6" /> : <Icon name="Play" className="w-6 h-6 ml-0.5" />}
                                        </button>
                                        <div className="text-right">
                                            <div className="text-3xl font-normal text-sky-300 digital-font leading-none">{formatTimeMain(seconds)}</div>
                                            <div className="text-[10px] text-blue-300 font-bold uppercase tracking-widest mt-1">Blue Session</div>
                                        </div>
                                        <button onClick={resetTimer} className="text-blue-400 hover:text-white transition-colors"><Icon name="RotateCcw" className="w-5 h-5" /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
